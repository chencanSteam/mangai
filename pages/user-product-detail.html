<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品详情 - 满改平台</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <main class="page-shell phone-stage">
      <div class="phone-wrap">
        <div class="phone-frame">
          <div class="phone-screen">
            <div class="android-status"><span>9:41</span><span>5G 92%</span></div>
            <header class="android-topbar">
              <span class="eyebrow">Product Detail</span>
              <h2>商品详情</h2>
              <div class="muted">查看改装商品的基础信息、适配车型与下单入口</div>
            </header>
            <section class="screen-content">
              <div class="stack">
                <section class="hero-banner">
                  <div class="eyebrow" id="productSku">SKU</div>
                  <h3 id="productName" style="margin:10px 0 8px; font-size:28px; font-family:var(--font-display);">改装商品</h3>
                  <p class="muted" id="productFitment">适配车型信息</p>
                </section>
                <section class="admin-detail-card">
                  <div class="eyebrow">Product Summary</div>
                  <h3>商品信息</h3>
                  <div class="admin-kv-list">
                    <div><span>品牌</span><strong id="productBrand">-</strong></div>
                    <div><span>价格</span><strong id="productPrice">¥0</strong></div>
                    <div><span>适配车型</span><strong id="productModel">-</strong></div>
                    <div><span>状态</span><strong>在售</strong></div>
                  </div>
                </section>
                <section class="mobile-list">
                  <article class="mobile-item">
                    <strong>商品图片</strong>
                    <div style="margin-top:12px; height:180px; border-radius:18px; display:grid; place-items:center; color:#9ca5b2; border:1px dashed rgba(255,255,255,0.16); background:rgba(255,255,255,0.03);">商品图片占位</div>
                  </article>
                  <article class="mobile-item">
                    <strong>商品说明</strong>
                    <div class="muted" style="margin-top:8px;">该商品适用于高性能改装与街道风格升级场景，支持到店安装和专业方案咨询。</div>
                  </article>
                </section>
                <div class="admin-action-row">
                  <a class="btn btn-secondary" href="user-app.html">返回商城</a>
                  <a class="btn btn-primary" id="productOrderLink" href="user-app.html">立即下单</a>
                </div>
              </div>
            </section>
            <nav class="bottom-nav">
              <button type="button" onclick="location.href='user-app.html'"><span>首页</span></button>
              <button type="button" onclick="location.href='user-app.html'"><span>商城</span></button>
              <button type="button" onclick="location.href='user-app.html'"><span>爱车</span></button>
              <button type="button" onclick="location.href='user-app.html'"><span>论坛</span></button>
              <button type="button" onclick="location.href='user-app.html'"><span>我的</span></button>
            </nav>
          </div>
        </div>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const sku = params.get("sku") || "SKU";
      const name = params.get("name") || "改装商品";
      const price = params.get("price") || "¥0";
      const brand = params.get("brand") || "-";
      const fitment = params.get("fitment") || "适配车型信息";
      const mallPage = params.get("mallPage") || "exterior";
      document.getElementById("productSku").textContent = sku;
      document.getElementById("productName").textContent = name;
      document.getElementById("productFitment").textContent = fitment;
      document.getElementById("productBrand").textContent = brand;
      document.getElementById("productPrice").textContent = price;
      document.getElementById("productModel").textContent = fitment;
      document.getElementById("productOrderLink").href = `user-app.html?mallPage=${encodeURIComponent(mallPage)}&orderSku=${encodeURIComponent(sku)}`;
    </script>
  </body>
</html>
