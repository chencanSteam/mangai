<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>满改平台前端演示</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="page-shell landing">
      <div class="container">
        <section class="entry-grid">
          <a class="panel entry-card" href="pages/platform-web.html">
            <span class="eyebrow">01</span>
            <h3>平台端 Web</h3>
            <p class="muted">一级菜单首页，覆盖订单、服务商、案例、结算、素材和系统配置。</p>
            <span class="btn btn-primary">进入后台</span>
          </a>
          <a class="panel entry-card" href="pages/provider-web.html">
            <span class="eyebrow">02</span>
            <h3>服务商 Web</h3>
            <p class="muted">高端改装门店展示站，含品牌形象、服务矩阵、案例橱窗与入驻入口。</p>
            <span class="btn btn-primary">查看站点</span>
          </a>
          <a class="panel entry-card" href="pages/admin-app.html">
            <span class="eyebrow">03</span>
            <h3>平台管理端 App</h3>
            <p class="muted">面向管理人员的移动审批与巡检工作台，突出待办与快速处理。</p>
            <span class="btn btn-primary">打开 App</span>
          </a>
          <a class="panel entry-card" href="pages/provider-app.html">
            <span class="eyebrow">04</span>
            <h3>服务商端 App</h3>
            <p class="muted">门店作业端，强调待接单、施工进度、采购记录与结算管理。</p>
            <span class="btn btn-primary">打开 App</span>
          </a>
          <a class="panel entry-card" href="pages/user-app.html">
            <span class="eyebrow">05</span>
            <h3>用户 App</h3>
            <p class="muted">内容消费与服务下单入口，覆盖案例、商城、论坛与爱车渲染。</p>
            <span class="btn btn-primary">打开 App</span>
          </a>
        </section>
      </div>
    </main>
  </body>
</html>
